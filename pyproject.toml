[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "llm-code"
version = "0.1.0"
description = "CLI coding agent for local LLMs"
license = {text = "MIT"}
authors = [{name = "Adam Hong"}]
readme = "README.md"
requires-python = ">=3.11"
classifiers = [
    "Development Status :: 4 - Beta",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "httpx[http2]>=0.27",
    "rich>=13.0",
    "prompt-toolkit>=3.0",
    "pydantic>=2.0",
    "click>=8.0",
    "textual>=1.0",
]

[project.urls]
Homepage = "https://github.com/user/llm-code"
Repository = "https://github.com/user/llm-code"
Issues = "https://github.com/user/llm-code/issues"

[project.optional-dependencies]
anthropic = ["anthropic>=0.40"]
websocket = ["websockets>=12.0"]
docs = ["mkdocs>=1.6", "mkdocs-material>=9.5"]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "respx>=0.22",
    "ruff>=0.5",
]

[project.scripts]
llm-code = "llm_code.cli.tui_main:main"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 100
