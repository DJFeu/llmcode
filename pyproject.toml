[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "llm-code"
version = "1.0.0"
description = "Open-source AI agent runtime for any LLM — production-grade coding agent with multi-layer memory, multi-agent orchestration, and defense-in-depth security"
license = {text = "MIT"}
authors = [{name = "Adam Hong"}]
readme = "README.md"
requires-python = ">=3.11"
classifiers = [
    "Development Status :: 5 - Production/Stable",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Topic :: Software Development :: Libraries",
]
dependencies = [
    "httpx[http2]>=0.27",
    "rich>=13.0",
    "prompt-toolkit>=3.0",
    "pydantic>=2.0",
    "click>=8.0",
    "textual>=1.0",
    "filelock>=3.12",
]

[project.urls]
Homepage = "https://github.com/DJFeu/llm-code"
Repository = "https://github.com/DJFeu/llm-code"
Issues = "https://github.com/DJFeu/llm-code/issues"

[project.optional-dependencies]
anthropic = ["anthropic>=0.40"]
websocket = ["websockets>=12.0"]
voice = ["sounddevice>=0.5"]
voice-google = ["google-cloud-speech>=2.0"]
computer-use = ["pyautogui>=0.9", "Pillow>=10.0", "mss>=9.0"]
ide = ["psutil>=5.9"]
telemetry = [
    "opentelemetry-api>=1.20",
    "opentelemetry-sdk>=1.20",
    "opentelemetry-exporter-otlp>=1.20",
]
web = ["readability-lxml>=0.8", "html2text>=2024.2"]
web-browser = ["readability-lxml>=0.8", "html2text>=2024.2", "playwright>=1.40"]
docs = ["mkdocs>=1.6", "mkdocs-material>=9.5"]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "respx>=0.22",
    "ruff>=0.5",
]

[project.scripts]
llm-code = "llm_code.cli.tui_main:main"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 100
