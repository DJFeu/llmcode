[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "llm-code"
version = "0.1.0"
description = "CLI coding agent for local LLMs"
requires-python = ">=3.11"
dependencies = [
    "httpx[http2]>=0.27",
    "rich>=13.0",
    "prompt-toolkit>=3.0",
    "pydantic>=2.0",
    "click>=8.0",
]

[project.optional-dependencies]
anthropic = ["anthropic>=0.40"]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "pytest-cov>=5.0",
    "respx>=0.22",
    "ruff>=0.5",
]

[project.scripts]
llm-code = "llm_code.cli.app:main"

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
target-version = "py311"
line-length = 100
