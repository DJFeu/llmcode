# GLM-5.1 (Zhipu) — self-hosted via llama.cpp
#
# Tested config: llama-server with --jinja, --alias glm-5.1.
# Architecture: 753.86B total / ~40B active (MoE), MLA attention,
# native context 202752, reasoning chain in `reasoning_content` field.
#
# To activate: copy this file to ~/.llmcode/model_profiles/glm-5.1.toml
# (file name without .toml is matched against the `model` value in
# ~/.llmcode/config.json — case-insensitive prefix match).

name = "GLM-5.1 (744B.A40B)"

[provider]
type = "openai-compat"
# llama.cpp + jinja exposes function calling, but GLM-5.1 tool-call
# robustness over OpenAI-compat is still uneven; use llmcode's XML
# fallback (proven path on Qwen3 / DeepSeek-R1) until verified.
native_tools = false
supports_reasoning = true
supports_images = false
force_xml_tools = true

[streaming]
# GLM-5.1 emits reasoning in a SEPARATE `reasoning_content` field
# (verified via smoke test against the running server). Unlike Qwen
# under vLLM — which prepends <think>...</think> to the main content —
# llama.cpp keeps reasoning isolated, so implicit_thinking must be
# false to prevent llmcode from stripping a non-existent prefix.
implicit_thinking = false
reasoning_field = "reasoning_content"

[thinking]
# llama.cpp jinja templates accept thinking budget via the same
# chat_template_kwargs route as vLLM.
thinking_extra_body_format = "chat_template_kwargs"
default_thinking_budget = 16384

[sampling]
# GLM family upstream guidance suggests 0.6; matches DeepSeek-R1 which
# shares the long-CoT pattern.
default_temperature = 0.6
reasoning_effort = "high"

[deployment]
# Enables llmcode's "unlimited token upgrade" path for self-hosted models.
is_local = true

[limits]
# Aligned with the actual --ctx-size used at server startup (64K).
# Bump if the server is later restarted with a larger context window.
# Native training context is 202752 — server can be re-launched up to
# that limit, in which case raise this number to match.
context_window = 65536
max_output_tokens = 8192

[pricing]
# Self-hosted — no per-token cost.
price_input = 0.0
price_output = 0.0

[routing]
# Tier C (LLM-based skill router) reuses the same model. Override to a
# smaller hosted model if the routing latency becomes a problem.
tier_c_model = ""

# v13 — profile-driven adapters. The ``[prompt]`` template + match
# tokens replace the legacy if-ladder in ``runtime/prompt.py``; the
# ``[parser]`` variants + ``[parser_hints]`` replace the GLM-specific
# defaults that used to live in ``view/stream_parser.py``.
[prompt]
template = "glm"
# Substring-matched against ``model_id.lower()``; first match wins so
# numeric filename prefix decides ordering. ``zhipu`` covers the
# original vendor brand (e.g. ``zhipu-chatglm``).
match = ["glm", "zhipu"]

[parser]
# Full default order — GLM streams emit any of the six variants
# depending on the chat template + tool path, so the registry walks
# the full list. Order matches DEFAULT_VARIANT_ORDER.
variants = [
    "json_payload",
    "hermes_function",
    "hermes_truncated",
    "harmony_kv",
    "glm_brace",
    "bare_name_tag",
]

[parser_hints]
# Variant 6 closes on ``</arg_value>`` (NOT ``</tool_call>``). Variant 7
# bodies legitimately contain ``</arg_value>`` but the StreamParser
# must wait for the real ``</tool_call>`` when ``<arg_key>`` is present
# — that hint is encoded on the ``harmony_kv`` variant itself
# (``requires_standard_close_when=("<arg_key>",)``) and StreamParser
# reads it via the registry. The chained variant-6 emissions separate
# sibling calls with U+2192 (``→``) plus whitespace, which we strip
# after each custom close.
custom_close_tags = ["</arg_value>"]
call_separator_chars = "\u2192 \t\r\n"

# v14 — tool consumption compat layer. GLM-5.1 reproducibly fails the
# call-tool → receive-result → consume-result pattern: the model
# writes a denial in `content` ("I don't have internet access") even
# after a successful tool round-trip. v14 introduces three runtime
# mechanisms (see docs/superpowers/specs/2026-04-27-llm-code-v14-...)
# to compensate for this class of model-level instruction-following
# weakness. GLM-5.1 opts in to all three.
[tool_consumption]
# Mechanism A — post-tool <system-reminder> injection. Default ON
# globally (set explicitly here for documentation clarity).
reminder_after_each_call = true

# Mechanism B — drop reasoning_content / reasoning fields from prior
# assistant messages on the outbound request. GLM-5.1's reasoning
# channel runs ahead of content; without this flag, a prior turn's
# denial reasoning could bleed into the next turn's reasoning even
# after a tool succeeded. Today's openai_compat path already filters
# reasoning via the ThinkingBlock drop, so the flag is a forward-
# compat guarantee — any future change that round-trips reasoning
# back to GLM will still be filtered for this profile.
strip_prior_reasoning = true
