# Claude Sonnet 4.6 — Anthropic API
#
# Demonstrates anthropic_native thinking format and pricing.
# The built-in profile is usually sufficient; use this as a template
# if you need to override defaults for a proxy or custom endpoint.

name = "Claude Sonnet 4.6"

[provider]
type = "anthropic"
native_tools = true
supports_reasoning = true
supports_images = true

[thinking]
thinking_extra_body_format = "anthropic_native"
default_thinking_budget = 10000

[pricing]
price_input = 3.00
price_output = 15.00

[limits]
max_output_tokens = 16384
context_window = 200000
