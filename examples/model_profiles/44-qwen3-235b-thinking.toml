# Qwen3-235B-A22B Thinking — self-hosted OpenAI-compatible endpoint
#
# Copy to ~/.llmcode/model_profiles/ if you want to override the bundled
# defaults for a local Qwen3-235B Thinking deployment.

name = "Qwen3-235B-A22B Thinking"

[provider]
type = "openai-compat"
native_tools = false
supports_reasoning = true
supports_images = false
force_xml_tools = true

[streaming]
implicit_thinking = false
reasoning_field = "reasoning_content"

[thinking]
thinking_extra_body_format = "chat_template_kwargs"
default_thinking_budget = 8192
post_tool_thinking_budget = 1024

[sampling]
default_temperature = 0.6
reasoning_effort = "high"

[deployment]
is_local = true

[limits]
context_window = 262144
max_output_tokens = 32768

[prompt]
template = "qwen"
match = [
    "qwen3-235b",
    "qwen3-235",
    "235b-a22b",
    "r235",
]
dedupe_with_template = true

[parser]
variants = [
    "json_payload",
    "hermes_function",
    "hermes_truncated",
    "harmony_kv",
    "glm_brace",
    "bare_name_tag",
]

[parallel_tools]
enable_parallel_tools = true
