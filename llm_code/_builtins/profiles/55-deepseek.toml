# DeepSeek — deepseek.j2 prompt
#
# Generic local/self-hosted DeepSeek profile. Endpoint-specific profiles can
# still override this with a narrower [prompt].match such as
# "planner/deepseek". For hosted DeepSeek Chat, the hardcoded
# ``deepseek-chat`` runtime profile keeps native tools enabled.

name = "DeepSeek"

[provider]
type = "openai-compat"
native_tools = false
supports_reasoning = true
supports_images = false
force_xml_tools = true

[streaming]
implicit_thinking = false
reasoning_field = "reasoning_content"

[thinking]
thinking_extra_body_format = "chat_template_kwargs"
default_thinking_budget = 4096
post_tool_thinking_budget = 512

[sampling]
default_temperature = 0.6
reasoning_effort = "high"

[deployment]
is_local = true

[limits]
context_window = 128000
max_output_tokens = 8192

[prompt]
template = "deepseek"
match = ["deepseek"]
dedupe_with_template = true

[parser]
variants = [
    "json_payload",
    "hermes_function",
    "hermes_truncated",
    "harmony_kv",
    "glm_hybrid",
    "glm_brace",
    "bare_name_tag",
]

[tool_consumption]
reminder_after_each_call = true
strip_prior_reasoning = true
retry_on_denial = true
empty_compile_retry = true
malformed_tool_retry = true
compress_old_tool_results = true
compile_after_tool_calls = 3
compile_thinking_budget = 512

[parallel_tools]
enable_parallel_tools = true
