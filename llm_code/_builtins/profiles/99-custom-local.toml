# Custom local model template
#
# Use this as a starting point for any self-hosted model served via
# vLLM, Ollama, or another OpenAI-compatible API.
#
# IMPORTANT: this is a TEMPLATE. The numeric prefix (99-) parks it
# at the END of the registration order so it never accidentally
# matches a built-in model id. The ``[prompt] match`` array is
# intentionally empty — uncomment and add your own substring tokens
# when you copy this into ``~/.llmcode/model_profiles/``.

name = "My Custom Model"

[provider]
type = "openai-compat"
native_tools = true        # set false if model doesn't support function calling
supports_reasoning = false  # set true for reasoning models (DeepSeek-R1, Qwen3, etc.)
supports_images = false

[streaming]
implicit_thinking = false   # set true if chat template injects <think> prefix
reasoning_field = ""        # e.g. "reasoning_content" for DeepSeek/Qwen

[thinking]
thinking_extra_body_format = "chat_template_kwargs"
default_thinking_budget = 8192

[deployment]
is_local = true             # enables unlimited token upgrades

[limits]
max_output_tokens = 4096
context_window = 32768

[routing]
tier_c_model = ""           # override to use a different model for skill routing

# v13 — profile-driven adapters. Uncomment + populate when copying to
# ``~/.llmcode/model_profiles/`` so this profile actually claims your
# model id. ``template`` may be a short name (e.g. ``"qwen"``) under
# ``llm_code/engine/prompts/models/`` or your own ``models/<name>.j2``
# file. Leaving these empty means ``resolve_profile_for_model`` never
# picks this profile and ``load_intro_prompt`` falls through to the
# default template.
[prompt]
template = ""
match = []

[parser]
# Empty list = use the registry's DEFAULT_VARIANT_ORDER. Override
# only if your model's chat template emits a known subset of variants
# (smaller list = faster parse path).
variants = []
